<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Heart Animation</title>
    <style>
        /* CSS: Fullscreen display with black background */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
        }
        canvas { 
            display: block; 
        }
        svg { 
            display: none; /* Hide the SVG path template */
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 600 552">
        <path id="heart-path" d="M300,501.17l-24.8-22.56C105.7,322.09,0,226.47,0,115.13C0,50.7,50.7,0,115.13,0c36.38,0,71.29,16.93,94.24,43.59
        C232.32,16.93,267.24,0,303.62,0c64.43,0,115.13,50.7,115.13,115.13c0,111.34-105.7,206.96-275.2,363.48L300,501.17z"/>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        /* MAIN JAVASCRIPT */

        // 1. Initialize Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.z = 600;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 2 : 1);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 2. Animation Setup (GSAP Timeline)
        const tl = gsap.timeline({ repeat: -1, yoyo: true });
        const path = document.querySelector("#heart-path");
        const length = path.getTotalLength();
        const vertices = [];

        // 3. Create Points Based on SVG Path
        const density = 1.5; // Particle density
        for (let i = 0; i < length; i += density) {
            const point = path.getPointAtLength(i);
            const vector = new THREE.Vector3(point.x, -point.y, 0);
            
            // Initial scatter effect
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            
            vertices.push(vector);

            // Animate transition from center to heart shape
            tl.from(vector, {
                x: 300,
                y: -276,
                z: 0,
                ease: "power2.inOut",
                duration: gsap.utils.random(2, 5)
            }, i * 0.001); 
        }

        // 4. Create Particle Object in Three.js
        const geometry = new THREE.BufferGeometry().setFromPoints(vertices);
        const material = new THREE.PointsMaterial({ 
            color: 0xee5282, 
            blending: THREE.AdditiveBlending, 
            size: 3,
            transparent: true,
            opacity: 0.8
        });

        const particles = new THREE.Points(geometry, material);

        // Adjust position to center the heart shape
        particles.position.x -= 300; 
        particles.position.y += 276; 
        scene.add(particles);

        // Smooth scene rotation animation
        gsap.fromTo(scene.rotation, { y: -0.3 }, {
            y: 0.3,
            repeat: -1,
            yoyo: true,
            ease: 'sine.inOut',
            duration: 5
        });

        /* 5. Render Loop Function */
        function animate() {
            requestAnimationFrame(animate);
            
            // Update particle positions every frame (CRITICAL for GSAP)
            geometry.setFromPoints(vertices);
            geometry.attributes.position.needsUpdate = true;
            
            controls.update();
            renderer.render(scene, camera);
        }

        /* 6. Handle Window Resize */
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run the animation
        animate();

    </script>
</body>
</html>
